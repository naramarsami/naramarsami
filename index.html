<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>나랏말싸미 - 한글 타자 연습</title>
    <meta name="description" content="한글의 아름다움을 타자로 느껴보세요. 훈민정음 서문과 명시를 필사하듯 칠 수 있는 모던한 한글 타자 연습 사이트입니다.">
    <meta name="keywords" content="나랏말싸미, 한글 타자, 타자 연습, 훈민정음, 시 타자, 필사, 한글 연습">
    <meta property="og:title" content="나랏말싸미">
    <meta property="og:description" content="한글의 아름다움을 타자로 느껴보세요. 모던한 감성의 한글 타자 연습 사이트입니다.">
    <meta property="og:type" content="website">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="wrapper">
        <header>
            <div class="logo">나랏말싸미</div>
            <div class="nav-links">
                <span id="feedback-btn">의견 남기기</span>
                <span class="active">한글</span>
            </div>
        </header>

        <main>
            <div class="main-content">
                <div class="poem-info" id="poem-info">
                    <span id="poem-title"></span>
                    <span class="divider">-</span>
                    <span id="poem-author"></span>
                </div>
                
                <div class="typing-container">
                    <div id="text-display" class="text-display">
                        <!-- Text will be injected here -->
                    </div>
                </div>
                
                <input type="text" id="typing-input" autocomplete="off" spellcheck="false" autofocus>
            </div>
        </main>

        <footer>
            <div class="stats">
                <div class="stat">
                    <span class="label">타수</span>
                    <span class="value" id="wpm">0</span>
                </div>
                <div class="stat">
                    <span class="label">정확도</span>
                    <span class="value" id="accuracy">100%</span>
                </div>
            </div>
        </footer>
    </div>

    <!-- Result Modal (Tab) -->
    <div id="result-modal" class="modal hidden">
        <div class="modal-content">
            <h2 class="modal-title">작성 완료</h2>
            <div class="modal-poem-info">
                <span id="modal-poem-title"></span> - <span id="modal-poem-author"></span>
            </div>
            
            <div class="modal-stats">
                <div class="modal-stat">
                    <span class="label">최종 타수</span>
                    <span class="value" id="modal-wpm">0</span>
                </div>
                <div class="modal-stat">
                    <span class="label">정확도</span>
                    <span class="value" id="modal-acc">100%</span>
                </div>
                <div class="modal-stat">
                    <span class="label">오타율</span>
                    <span class="value" id="modal-errors">0%</span>
                </div>
            </div>
            
            <div class="modal-actions">
                <button id="share-btn" class="secondary">기록 공유</button>
                <button id="ranking-btn" class="secondary">나의 기록</button>
                <button id="next-btn">다음 글로</button>
            </div>
        </div>
    </div>

    <!-- Ranking Modal -->
    <div id="ranking-modal" class="modal hidden">
        <div class="modal-content">
            <h2 class="modal-title">나의 타자 기록</h2>
            <div class="ranking-list" id="ranking-list">
                <!-- Records injected here -->
            </div>
            <button id="close-ranking-btn" class="secondary" style="margin-top: 2rem;">닫기</button>
        </div>
    </div>

    <!-- Feedback Modal -->
    <div id="feedback-modal" class="modal hidden">
        <div class="modal-content">
            <h2 class="modal-title">의견 남기기</h2>
            <p class="modal-poem-info" style="margin-bottom: 1.5rem;">더 나은 나랏말싸미를 위해 의견을 남겨주세요.</p>
            <textarea id="feedback-text" placeholder="여기에 의견을 자유롭게 적어주세요..." rows="5"></textarea>
            <div class="modal-actions" style="margin-top: 1.5rem;">
                <button id="close-feedback-btn" class="secondary">취소</button>
                <button id="submit-feedback-btn">보내기</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
