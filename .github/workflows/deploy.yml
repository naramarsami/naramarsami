name: Deploy static content to Pages

on:
  # main 브랜치에 push가 발생할 때마다 자동으로 실행됩니다.
  push:
    branches: ["main"]
  # GitHub Actions 탭에서 수동으로 실행할 수 있게 해줍니다.
  workflow_dispatch:

# GitHub Pages 배포를 위해 필요한 권한 설정
permissions:
  contents: read
  pages: write
  id-token: write

# 배포가 여러 개 밀려있을 때 꼬이지 않도록 동시성 제어
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout 코드를 가져옵니다.
        uses: actions/checkout@v4
        
      - name: Setup Pages 환경을 설정합니다.
        uses: actions/configure-pages@v4
        
      - name: Upload artifact 배포할 파일을 업로드합니다.
        uses: actions/upload-pages-artifact@v3
        with:
          # 현재 디렉토리('.')의 모든 파일을 배포합니다.
          path: '.'
          
      - name: Deploy to GitHub Pages 최종적으로 웹사이트를 배포합니다.
        id: deployment
        uses: actions/deploy-pages@v4
